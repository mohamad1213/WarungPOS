{% extends 'base.html' %}

{% block content %}
<div class="flex-1 overflow-y-auto p-4 sm:p-8 bg-surface flex items-center justify-center">
    <div class="w-full max-w-md bg-white p-8 rounded-2xl shadow-sm border-2 border-red-100 text-center">
        <span class="material-symbols-outlined text-6xl text-error mb-4" data-icon="warning">warning</span>
        
        <h1 class="font-headline-lg text-on-surface mb-2">Hapus Produk?</h1>
        <p class="text-on-surface-variant font-body-md mb-8">Apakah Anda yakin ingin menghapus produk <strong>"{{ produk.nama }}"</strong> secara permanen? Tindakan ini tidak dapat dibatalkan.</p>
        
        <form method="POST" class="flex gap-3">
            {% csrf_token %}
            <a href="{% url 'produk' %}" class="flex-1 h-12 flex items-center justify-center rounded-xl font-bold border-2 border-gray-200 text-gray-600 hover:bg-gray-50 transition-all">Batal</a>
            <button type="submit" class="flex-1 h-12 flex items-center justify-center rounded-xl font-bold bg-error text-white hover:brightness-110 active:scale-95 transition-all shadow-md">Ya, Hapus</button>
        </form>
    </div>
</div>
{% endblock %}
