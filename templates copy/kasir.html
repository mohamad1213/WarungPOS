{% extends 'base.html' %}

{% block content %}
<div class="row">
    <!-- Area Produk -->
    <div class="col-md-7 mb-4">
        <h4 class="mb-3">Daftar Produk</h4>
        <div class="row g-2">
            {% for produk in produks %}
            <div class="col-6 col-sm-4">
                <div class="card text-center product-card h-100 bg-light" onclick="addToCart({{ produk.id }}, '{{ produk.nama }}', {{ produk.harga }})">
                    <div class="card-body d-flex flex-column justify-content-center p-3">
                        <h6 class="card-title fw-bold text-primary">{{ produk.nama }}</h6>
                        <p class="card-text mb-0">Rp{{ produk.harga }}</p>
                    </div>
                </div>
            </div>
            {% empty %}
            <div class="col-12 text-muted">Belum ada produk. Tambahkan melalui admin.</div>
            {% endfor %}
        </div>
    </div>

    <!-- Area Keranjang -->
    <div class="col-md-5">
        <div class="cart-container">
            <h4 class="mb-3">🛒 Pesanan</h4>
            
            <div class="mb-3">
                <label for="customerSelect" class="form-label text-muted small">Pelanggan (Opsional)</label>
                <select class="form-select form-select-lg" id="customerSelect">
                    <option value="">-- Umum --</option>
                    {% for customer in customers %}
                    <option value="{{ customer.id }}">{{ customer.nama }}</option>
                    {% endfor %}
                </select>
            </div>

            <div id="cartItems" class="mb-3" style="min-height: 150px; max-height: 300px; overflow-y: auto;">
                <div class="text-center text-muted mt-4" id="emptyCartMsg">Keranjang masih kosong</div>
            </div>

            <hr>
            
            <div class="d-flex justify-content-between align-items-center mb-3">
                <h5 class="mb-0">Total</h5>
                <h3 class="mb-0 fw-bold text-success" id="totalPrice">Rp0</h3>
            </div>

            <div class="d-grid gap-2">
                <button class="btn btn-success btn-large fw-bold" onclick="pay('bayar')">💰 BAYAR SEKARANG</button>
                <button class="btn btn-warning btn-large text-dark fw-bold" onclick="pay('nanti')">📝 BAYAR NANTI (KASBON)</button>
            </div>
        </div>
    </div>
</div>
{% endblock %}

{% block extra_js %}
<script>
    let cart = [];

    function addToCart(id, name, price) {
        const existingItem = cart.find(item => item.id === id);
        if (existingItem) {
            existingItem.qty += 1;
            existingItem.subtotal = existingItem.qty * price;
        } else {
            cart.push({ id: id, name: name, price: price, qty: 1, subtotal: price });
        }
        renderCart();
    }

    function updateQty(id, delta) {
        const item = cart.find(item => item.id === id);
        if (item) {
            item.qty += delta;
            if (item.qty <= 0) {
                cart = cart.filter(i => i.id !== id);
            } else {
                item.subtotal = item.qty * item.price;
            }
            renderCart();
        }
    }

    function formatRupiah(number) {
        return "Rp" + number.toLocaleString('id-ID');
    }

    function renderCart() {
        const cartItemsDiv = document.getElementById('cartItems');
        const emptyMsg = document.getElementById('emptyCartMsg');
        const totalPriceDiv = document.getElementById('totalPrice');
        
        cartItemsDiv.innerHTML = '';
        let total = 0;

        if (cart.length === 0) {
            cartItemsDiv.appendChild(emptyMsg);
            emptyMsg.style.display = 'block';
            totalPriceDiv.innerText = "Rp0";
            return;
        } else {
            emptyMsg.style.display = 'none';
        }

        cart.forEach(item => {
            total += item.subtotal;
            const itemDiv = document.createElement('div');
            itemDiv.className = 'd-flex justify-content-between align-items-center mb-2 p-2 border rounded';
            itemDiv.innerHTML = `
                <div>
                    <div class="fw-bold">${item.name}</div>
                    <div class="small text-muted">${formatRupiah(item.price)}</div>
                </div>
                <div class="d-flex align-items-center">
                    <button class="btn btn-sm btn-outline-danger me-2" onclick="updateQty(${item.id}, -1)">-</button>
                    <span class="fw-bold" style="width: 20px; text-align: center;">${item.qty}</span>
                    <button class="btn btn-sm btn-outline-success ms-2" onclick="updateQty(${item.id}, 1)">+</button>
                </div>
                <div class="fw-bold text-end" style="min-width: 80px;">
                    ${formatRupiah(item.subtotal)}
                </div>
            `;
            cartItemsDiv.appendChild(itemDiv);
        });

        totalPriceDiv.innerText = formatRupiah(total);
    }

    async function pay(status) {
        if (cart.length === 0) {
            alert('Keranjang kosong!');
            return;
        }

        const customerId = document.getElementById('customerSelect').value;
        const total = cart.reduce((sum, item) => sum + item.subtotal, 0);

        const payload = {
            customer_id: customerId || null,
            status: status,
            total: total,
            items: cart
        };

        try {
            const response = await fetch("{% url 'create_transaction' %}", {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                },
                body: JSON.stringify(payload)
            });

            const result = await response.json();
            if (result.status === 'success') {
                alert('Transaksi Berhasil!');
                cart = [];
                document.getElementById('customerSelect').value = "";
                renderCart();
            } else {
                alert('Gagal: ' + result.message);
            }
        } catch (error) {
            alert('Terjadi kesalahan jaringan.');
            console.error(error);
        }
    }
</script>
{% endblock %}
